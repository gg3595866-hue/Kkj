openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: proxy
    description: Proxy requests with auth headers
  - name: saved-requests
    description: Saved request collections
  - name: history
    description: Request history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /proxy/send:
    post:
      operationId: sendProxyRequest
      tags: [proxy]
      summary: Send a proxied HTTP request
      description: Forwards the request to the target URL with the given headers and body, bypassing CORS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyRequestInput"
      responses:
        "200":
          description: Response from target URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /proxy/requests:
    get:
      operationId: listSavedRequests
      tags: [saved-requests]
      summary: List all saved requests
      responses:
        "200":
          description: List of saved requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedRequest"
    post:
      operationId: createSavedRequest
      tags: [saved-requests]
      summary: Save a new request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRequestInput"
      responses:
        "201":
          description: Created saved request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRequest"

  /proxy/requests/{id}:
    put:
      operationId: updateSavedRequest
      tags: [saved-requests]
      summary: Update a saved request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRequestInput"
      responses:
        "200":
          description: Updated saved request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSavedRequest
      tags: [saved-requests]
      summary: Delete a saved request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /proxy/probe:
    post:
      operationId: probeRequest
      tags: [proxy]
      summary: Probe a URL using timing analysis, partial-abort, or Expect-100-continue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeInput"
      responses:
        "200":
          description: Probe results for each technique requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /proxy/scan:
    post:
      operationId: scanEndpoints
      tags: [proxy]
      summary: Probe multiple endpoint paths with the same auth token
      description: Tries each endpoint path (GET then POST) without triggering game actions. Returns which paths respond with data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInput"
      responses:
        "200":
          description: Scan results for each probed path
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanResult"

  /proxy/history:
    get:
      operationId: listRequestHistory
      tags: [history]
      summary: List request history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Request history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"
    delete:
      operationId: clearRequestHistory
      tags: [history]
      summary: Clear all request history
      responses:
        "204":
          description: Cleared

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ProbeInput:
      type: object
      required:
        - url
        - techniques
      properties:
        url:
          type: string
        method:
          type: string
          default: POST
        headers:
          type: object
          additionalProperties:
            type: string
        bearerToken:
          type: ["string", "null"]
        authHeaderName:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        techniques:
          type: array
          items:
            type: string
            enum: [timing, partial, expect100]
          description: |
            timing — send N identical requests and record response time + body for each (reveals variance in server state).
            partial — send full request, read response status+headers then immediately abort before reading body (avoids fully consuming the response stream).
            expect100 — send headers with Expect:100-continue and withhold the body; captures whatever the server replies before it receives payload.
        timingRounds:
          type: integer
          default: 5
          description: Number of requests to send for the timing technique

    ProbeOutput:
      type: object
      properties:
        timing:
          type: array
          items:
            $ref: "#/components/schemas/ProbeRound"
        partial:
          $ref: "#/components/schemas/ProbeRound"
        expect100:
          $ref: "#/components/schemas/ProbeRound"

    ProbeRound:
      type: object
      required:
        - durationMs
        - status
      properties:
        durationMs:
          type: integer
        status:
          type: integer
        statusText:
          type: string
        responseHeaders:
          type: object
          additionalProperties:
            type: string
        body:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        note:
          type: string
          description: Human-readable description of what happened

    ScanInput:
      type: object
      required:
        - baseUrl
        - paths
      properties:
        baseUrl:
          type: string
          description: Base URL to probe (e.g. https://1x-bet.mobi/games-frame/service-api/games-thimbles/)
        paths:
          type: array
          items:
            type: string
          description: List of endpoint path names to try (e.g. GetHistory, GetState)
        queryParams:
          type: ["string", "null"]
          description: Query string to append (e.g. language=en&whence=114)
        bearerToken:
          type: ["string", "null"]
        authHeaderName:
          type: ["string", "null"]
        headers:
          type: object
          additionalProperties:
            type: string
        postBody:
          type: ["string", "null"]
          description: Optional POST body to try when GET returns nothing useful

    ScanResult:
      type: object
      required:
        - path
        - method
        - status
        - durationMs
        - hasData
      properties:
        path:
          type: string
        method:
          type: string
        status:
          type: integer
        statusText:
          type: string
        durationMs:
          type: integer
        hasData:
          type: boolean
          description: True if response looks like it contains real data
        body:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ProxyRequestInput:
      type: object
      required:
        - url
        - method
      properties:
        url:
          type: string
          description: Target URL to proxy to
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
        headers:
          type: object
          additionalProperties:
            type: string
          description: Custom headers to send
        bearerToken:
          type: ["string", "null"]
          description: Bearer token value (without "Bearer " prefix)
        authHeaderName:
          type: ["string", "null"]
          description: Header name for the auth token (default "Authorization", use "x-auth" for 1xBet etc.)
        body:
          type: ["string", "null"]
          description: Request body (JSON string or plain text)
        contentType:
          type: ["string", "null"]
          description: Content-Type header value

    ProxyResponse:
      type: object
      required:
        - status
        - statusText
        - headers
        - body
        - durationMs
        - historyId
      properties:
        status:
          type: integer
        statusText:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
          description: Response body as string
        durationMs:
          type: integer
          description: Request duration in milliseconds
        historyId:
          type: integer
          description: ID of the history entry created for this request

    SavedRequest:
      type: object
      required:
        - id
        - name
        - url
        - method
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        method:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        bearerToken:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        contentType:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SavedRequestInput:
      type: object
      required:
        - name
        - url
        - method
      properties:
        name:
          type: string
        url:
          type: string
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
        headers:
          type: object
          additionalProperties:
            type: string
        bearerToken:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        contentType:
          type: ["string", "null"]

    HistoryEntry:
      type: object
      required:
        - id
        - url
        - method
        - status
        - durationMs
        - createdAt
      properties:
        id:
          type: integer
        url:
          type: string
        method:
          type: string
        status:
          type: integer
        statusText:
          type: string
        requestHeaders:
          type: object
          additionalProperties:
            type: string
        responseHeaders:
          type: object
          additionalProperties:
            type: string
        responseBody:
          type: ["string", "null"]
        durationMs:
          type: integer
        createdAt:
          type: string
          format: date-time
