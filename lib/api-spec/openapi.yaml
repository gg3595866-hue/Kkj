openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: proxy
    description: Proxy requests with auth headers
  - name: saved-requests
    description: Saved request collections
  - name: history
    description: Request history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /proxy/send:
    post:
      operationId: sendProxyRequest
      tags: [proxy]
      summary: Send a proxied HTTP request
      description: Forwards the request to the target URL with the given headers and body, bypassing CORS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyRequestInput"
      responses:
        "200":
          description: Response from target URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /proxy/requests:
    get:
      operationId: listSavedRequests
      tags: [saved-requests]
      summary: List all saved requests
      responses:
        "200":
          description: List of saved requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedRequest"
    post:
      operationId: createSavedRequest
      tags: [saved-requests]
      summary: Save a new request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRequestInput"
      responses:
        "201":
          description: Created saved request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRequest"

  /proxy/requests/{id}:
    put:
      operationId: updateSavedRequest
      tags: [saved-requests]
      summary: Update a saved request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRequestInput"
      responses:
        "200":
          description: Updated saved request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSavedRequest
      tags: [saved-requests]
      summary: Delete a saved request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /proxy/bypass:
    post:
      operationId: bypassProxy
      tags: [proxy]
      summary: Attempt direct connection past a reverse proxy (Angie/nginx)
      description: |
        Resolves DNS, port-scans resolved IPs, probes them directly with a spoofed Host header,
        and tries alternative Host values — to find a path to the backend that bypasses the front proxy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BypassInput"
      responses:
        "200":
          description: Bypass probe results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BypassOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /proxy/probe:
    post:
      operationId: probeRequest
      tags: [proxy]
      summary: Probe a URL using timing analysis, partial-abort, or Expect-100-continue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeInput"
      responses:
        "200":
          description: Probe results for each technique requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeOutput"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /proxy/scan:
    post:
      operationId: scanEndpoints
      tags: [proxy]
      summary: Probe multiple endpoint paths with the same auth token
      description: Tries each endpoint path (GET then POST) without triggering game actions. Returns which paths respond with data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInput"
      responses:
        "200":
          description: Scan results for each probed path
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanResult"

  /proxy/history:
    get:
      operationId: listRequestHistory
      tags: [history]
      summary: List request history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Request history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"
    delete:
      operationId: clearRequestHistory
      tags: [history]
      summary: Clear all request history
      responses:
        "204":
          description: Cleared

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BypassInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
        method:
          type: string
          default: POST
        headers:
          type: object
          additionalProperties:
            type: string
        bearerToken:
          type: ["string", "null"]
        authHeaderName:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        techniques:
          type: array
          items:
            type: string
            enum: [dns, portscan, directip, hostswap]
          default: [dns, portscan, directip]
        extraPorts:
          type: array
          items:
            type: integer

    BypassOutput:
      type: object
      properties:
        dns:
          type: object
          additionalProperties: true
        portscan:
          type: object
          additionalProperties: true
        directip:
          type: object
          additionalProperties: true
        hostswap:
          type: object
          additionalProperties: true

    ProbeInput:
      type: object
      required:
        - url
        - techniques
      properties:
        url:
          type: string
        method:
          type: string
          default: POST
        headers:
          type: object
          additionalProperties:
            type: string
        bearerToken:
          type: ["string", "null"]
        authHeaderName:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        techniques:
          type: array
          items:
            type: string
            enum: [timing, partial, expect100, race, cross, methodprobe, validationprobe]
          description: |
            timing — send N identical requests and record response time + body for each (reveals variance in server state).
            partial — send full request, read response status+headers then immediately abort before reading body (avoids fully consuming the response stream).
            expect100 — send headers with Expect:100-continue and withhold the body; captures whatever the server replies before it receives payload.
            race — open N raw connections, hold every request just short of complete, then release the final bytes on all connections in the same tick (single-packet / last-byte-sync attack) so they land inside the server's check-then-act window instead of being serialized.
            cross — alternate timing rounds between Site A (primary URL/token) and Site B (mirror site with separate account), so each site only sees half the probe volume and the server does not flag repeated identical requests from one session.
            methodprobe — send OPTIONS, HEAD, and GET to the same URL with the same auth and record what the server allows; these are non-mutating HTTP methods that reveal server capability without registering any game action.
            validationprobe — send the request body N times with a different field patched each time (e.g. AN=-1, GT=0); requests that fail pre-commit validation reveal server behaviour without registering an action.
        timingRounds:
          type: integer
          default: 5
          description: Number of requests to send for the timing technique
        raceConnections:
          type: integer
          default: 10
          description: Number of simultaneous connections to open for the race technique
        crossRounds:
          type: integer
          default: 6
          description: "Total rounds for the cross technique (split evenly: even rounds → Site A, odd rounds → Site B)"
        siteBUrl:
          type: ["string", "null"]
          description: "Cross probe: URL for Site B (the mirror site with a separate account)"
        siteBMethod:
          type: ["string", "null"]
          description: "Cross probe: HTTP method for Site B (defaults to the same method as Site A)"
        siteBHeaders:
          type: object
          additionalProperties:
            type: string
          description: "Cross probe: custom headers for Site B (e.g. sec-ch-ua, referrer overrides)"
        siteBBearerToken:
          type: ["string", "null"]
          description: "Cross probe: bearer token for Site B account"
        siteBAuthHeaderName:
          type: ["string", "null"]
          description: "Cross probe: auth header name for Site B (default x-auth or Authorization)"
        siteBBody:
          type: ["string", "null"]
          description: "Cross probe: request body for Site B (usually same structure as Site A but with Site B user ID)"
        validationPatches:
          type: array
          items:
            type: string
          description: "Validation probe: JSON strings, each merged over the base body for one sub-request (e.g. '{\"AN\":-1}' patches the action number)"

    ProbeOutput:
      type: object
      properties:
        timing:
          type: array
          items:
            $ref: "#/components/schemas/ProbeRound"
        partial:
          $ref: "#/components/schemas/ProbeRound"
        expect100:
          $ref: "#/components/schemas/ProbeRound"
        race:
          $ref: "#/components/schemas/RaceResult"
        cross:
          type: array
          items:
            $ref: "#/components/schemas/CrossRound"
        methodprobe:
          type: array
          items:
            $ref: "#/components/schemas/MethodProbeRound"
        validationprobe:
          type: array
          items:
            $ref: "#/components/schemas/ValidationProbeRound"

    MethodProbeRound:
      allOf:
        - $ref: "#/components/schemas/ProbeRound"
        - type: object
          required:
            - httpMethod
          properties:
            httpMethod:
              type: string
              description: The HTTP method that was sent (OPTIONS, HEAD, GET)
            allowHeader:
              type: ["string", "null"]
              description: Value of the Allow response header, if present

    ValidationProbeRound:
      allOf:
        - $ref: "#/components/schemas/ProbeRound"
        - type: object
          required:
            - patch
          properties:
            patch:
              type: string
              description: The JSON patch object that was merged over the base body
            committed:
              type: boolean
              description: True if the server returned 2xx (likely committed an action), false if rejected at validation

    CrossRound:
      allOf:
        - $ref: "#/components/schemas/ProbeRound"
        - type: object
          required:
            - site
            - targetUrl
            - authSite
          properties:
            site:
              type: string
              enum: [A, B]
              description: Which site's URL was targeted this round
            targetUrl:
              type: string
              description: The URL that was actually called
            authSite:
              type: string
              enum: [A, B]
              description: Which site's JWT token was used (opposite of targetUrl's site)

    RaceResult:
      type: object
      required:
        - releaseSkewMs
        - successCount
        - raceLikely
        - attempts
      properties:
        releaseSkewMs:
          type: number
          description: Time spread (ms) between the first and last final-byte write across all connections — lower means a tighter synchronized release
        successCount:
          type: integer
          description: How many of the N connections received a "success" response (2xx, or non-error status) rather than a decline
        raceLikely:
          type: boolean
          description: True when more than one connection succeeded — evidence the requests landed inside the same check-then-act window
        note:
          type: string
        error:
          type: ["string", "null"]
        attempts:
          type: array
          items:
            $ref: "#/components/schemas/RaceAttempt"

    RaceAttempt:
      type: object
      required:
        - index
        - status
      properties:
        index:
          type: integer
        status:
          type: integer
        statusText:
          type: string
        responseHeaders:
          type: object
          additionalProperties:
            type: string
        body:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        connectMs:
          type: number
          description: Time from dial to connection established, before the synchronized release
        suffixSentAt:
          type: number
          description: Timestamp (ms, relative to batch start) when this connection's final bytes were written
        firstByteAtMs:
          type: ["number", "null"]
          description: Time (ms, relative to suffix release) until the first response byte arrived on this connection

    ProbeRound:
      type: object
      required:
        - durationMs
        - status
      properties:
        durationMs:
          type: integer
        status:
          type: integer
        statusText:
          type: string
        responseHeaders:
          type: object
          additionalProperties:
            type: string
        body:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        note:
          type: string
          description: Human-readable description of what happened

    ScanInput:
      type: object
      required:
        - baseUrl
        - paths
      properties:
        baseUrl:
          type: string
          description: Base URL to probe (e.g. https://1x-bet.mobi/games-frame/service-api/games-thimbles/)
        paths:
          type: array
          items:
            type: string
          description: List of endpoint path names to try (e.g. GetHistory, GetState)
        queryParams:
          type: ["string", "null"]
          description: Query string to append (e.g. language=en&whence=114)
        bearerToken:
          type: ["string", "null"]
        authHeaderName:
          type: ["string", "null"]
        headers:
          type: object
          additionalProperties:
            type: string
        postBody:
          type: ["string", "null"]
          description: Optional POST body to try when GET returns nothing useful

    ScanResult:
      type: object
      required:
        - path
        - method
        - status
        - durationMs
        - hasData
      properties:
        path:
          type: string
        method:
          type: string
        status:
          type: integer
        statusText:
          type: string
        durationMs:
          type: integer
        hasData:
          type: boolean
          description: True if response looks like it contains real data
        body:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ProxyRequestInput:
      type: object
      required:
        - url
        - method
      properties:
        url:
          type: string
          description: Target URL to proxy to
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
        headers:
          type: object
          additionalProperties:
            type: string
          description: Custom headers to send
        bearerToken:
          type: ["string", "null"]
          description: Bearer token value (without "Bearer " prefix)
        authHeaderName:
          type: ["string", "null"]
          description: Header name for the auth token (default "Authorization", use "x-auth" for 1xBet etc.)
        body:
          type: ["string", "null"]
          description: Request body (JSON string or plain text)
        contentType:
          type: ["string", "null"]
          description: Content-Type header value

    ProxyResponse:
      type: object
      required:
        - status
        - statusText
        - headers
        - body
        - durationMs
        - historyId
      properties:
        status:
          type: integer
        statusText:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
          description: Response body as string
        durationMs:
          type: integer
          description: Request duration in milliseconds
        historyId:
          type: integer
          description: ID of the history entry created for this request

    SavedRequest:
      type: object
      required:
        - id
        - name
        - url
        - method
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        method:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        bearerToken:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        contentType:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SavedRequestInput:
      type: object
      required:
        - name
        - url
        - method
      properties:
        name:
          type: string
        url:
          type: string
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
        headers:
          type: object
          additionalProperties:
            type: string
        bearerToken:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        contentType:
          type: ["string", "null"]

    HistoryEntry:
      type: object
      required:
        - id
        - url
        - method
        - status
        - durationMs
        - createdAt
      properties:
        id:
          type: integer
        url:
          type: string
        method:
          type: string
        status:
          type: integer
        statusText:
          type: string
        requestHeaders:
          type: object
          additionalProperties:
            type: string
        responseHeaders:
          type: object
          additionalProperties:
            type: string
        responseBody:
          type: ["string", "null"]
        durationMs:
          type: integer
        createdAt:
          type: string
          format: date-time
